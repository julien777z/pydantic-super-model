name: Agent Sync

on:
  push:
    branches:
      - main
    paths:
      - ".agents/**"
      - ".github/workflows/agent-sync.yml"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  sync:
    uses: julien777z/agent-sync-action/.github/workflows/agent-sync.yml@v1
    with:
      refresh_external_skills: ${{ github.event_name == 'schedule' }}
    secrets: inherit
