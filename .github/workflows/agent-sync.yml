name: Agent Sync

on:
  push:
    branches:
      - main
    paths:
      - ".agents/**"
      - ".github/scripts/agent_sync.py"
      - ".github/scripts/requirements-agent-sync.txt"
      - ".github/workflows/agent-sync.yml"

concurrency:
  group: agent-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    name: Agent Sync
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r .github/scripts/requirements-agent-sync.txt

      - name: Run agent sync
        run: python .github/scripts/agent_sync.py

      - name: Verify sync idempotence
        run: python .github/scripts/agent_sync.py --dry-run

      - name: Commit and push generated changes
        shell: bash
        run: |
          set -euo pipefail

          git add -u

          if [ -d ".claude" ]; then git add .claude/; fi
          if [ -d ".cursor" ]; then git add .cursor/; fi
          if [ -d ".codex" ]; then git add .codex/; fi
          if [ -f "AGENTS.override.md" ]; then git add AGENTS.override.md; fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: run agent sync"
          git push origin "${{ github.ref_name }}"
