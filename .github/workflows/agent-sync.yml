name: Agent Sync

on:
  push:
    branches:
      - main
    paths:
      - ".agents/**"
      - ".github/scripts/agent_sync/**"
      - ".github/workflows/agent-sync.yml"

concurrency:
  group: agent-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    name: Agent Sync
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install "pydantic>=2.0.0,<3" "pyyaml>=6.0.0"

      - name: Run agent sync tests
        working-directory: .github/scripts
        run: python -m unittest discover -s agent_sync/tests

      - name: Validate canonical agent configuration
        working-directory: .github/scripts
        run: python -m agent_sync.main validate

      - name: Run agent sync
        working-directory: .github/scripts
        run: python -m agent_sync.main sync

      - name: Commit and push generated changes
        shell: bash
        run: |
          set -euo pipefail

          git add -u

          if [ -d ".agents" ]; then git add .agents/; fi
          if [ -d ".claude" ]; then git add .claude/; fi
          if [ -d ".cursor" ]; then git add .cursor/; fi
          if [ -d ".codex" ]; then git add .codex/; fi
          if [ -f "AGENTS.md" ]; then git add AGENTS.md; fi
          if [ -f "AGENTS.override.md" ]; then git add AGENTS.override.md; fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: run agent sync"
          git push origin "${{ github.ref_name }}"

      - name: Verify sync idempotence
        working-directory: .github/scripts
        run: python -m agent_sync.main sync --dry-run
