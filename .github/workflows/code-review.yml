name: Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true

permissions:
  contents: read
  pull-requests: write

# One in-flight run per PR; a newer commit/comment cancels a superseded run.
concurrency:
  group: code-review-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      claude: ${{ steps.secrets.outputs.claude }}
      cursor: ${{ steps.secrets.outputs.cursor }}
    steps:
      - name: Check secrets
        id: secrets
        env:
          CLAUDE_REVIEW_ROUTINE_API_KEY: ${{ secrets.CLAUDE_REVIEW_ROUTINE_API_KEY }}
          CLAUDE_REVIEW_ROUTINE_ID: ${{ secrets.CLAUDE_REVIEW_ROUTINE_ID }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -n "$CLAUDE_REVIEW_ROUTINE_API_KEY" ] && [ -n "$CLAUDE_REVIEW_ROUTINE_ID" ]; then
            echo "claude=true" >> "$GITHUB_OUTPUT"
          else
            echo "claude=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$CURSOR_API_KEY" ]; then
            echo "cursor=true" >> "$GITHUB_OUTPUT"
          else
            echo "cursor=false" >> "$GITHUB_OUTPUT"
          fi

  start-claude-review:
    name: Start Claude Review
    needs: gate
    if: >-
      ${{ needs.gate.outputs.claude == 'true' && (
        (github.event_name == 'pull_request' && github.event.action == 'opened'
          && github.event.pull_request.head.repo.full_name == github.repository
          && github.event.sender.type != 'Bot'
          && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association))
        || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null
          && github.event.sender.type != 'Bot'
          && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
          && contains(github.event.comment.body, 'claude review'))
        || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_FROM_PR: ${{ github.event.pull_request.number }}
          PR_FROM_COMMENT: ${{ github.event.issue.number }}
          PR_FROM_DISPATCH: ${{ github.event.inputs.pr_number }}
        run: |
          case "$EVENT_NAME" in
            pull_request) PR_NUMBER="$PR_FROM_PR" ;;
            issue_comment) PR_NUMBER="$PR_FROM_COMMENT" ;;
            workflow_dispatch) PR_NUMBER="$PR_FROM_DISPATCH" ;;
          esac

          # pull_request.* fields are empty on issue_comment/workflow_dispatch, so resolve from the API.
          read -r URL HEAD_REF HEAD_SHA AUTHOR <<EOF
          $(gh pr view "$PR_NUMBER" --repo "$REPO" --json url,headRefName,headRefOid,author \
              --jq '[.url, .headRefName, .headRefOid, .author.login] | @tsv')
          EOF

          {
            echo "number=$PR_NUMBER"
            echo "url=$URL"
            echo "head_ref=$HEAD_REF"
            echo "head_sha=$HEAD_SHA"
            echo "author=$AUTHOR"
          } >> "$GITHUB_OUTPUT"
      - name: Start Claude Review
        env:
          CLAUDE_REVIEW_ROUTINE_API_KEY: ${{ secrets.CLAUDE_REVIEW_ROUTINE_API_KEY }}
          CLAUDE_REVIEW_ROUTINE_ID: ${{ secrets.CLAUDE_REVIEW_ROUTINE_ID }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
        run: |
          payload=$(jq -n \
            --arg repo "$REPO" \
            --arg num "$PR_NUMBER" \
            --arg url "$PR_URL" \
            --arg ref "$HEAD_REF" \
            --arg author "$PR_AUTHOR" \
            --arg sha "$HEAD_SHA" \
            '{text: "Review pull request #\($num) (\($url)) in repo \($repo), on branch \($ref), opened by \($author), triggered by commit \($sha)."}')

          curl --fail-with-body -sS -X POST \
            "https://api.anthropic.com/v1/claude_code/routines/${CLAUDE_REVIEW_ROUTINE_ID}/fire" \
            -H "Authorization: Bearer $CLAUDE_REVIEW_ROUTINE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "Content-Type: application/json" \
            -d "$payload"

  start-cursor-review:
    name: Start Cursor Review
    needs: gate
    if: >-
      ${{ needs.gate.outputs.cursor == 'true'
          && github.event_name == 'pull_request' && github.event.action == 'synchronize'
          && github.event.pull_request.head.repo.full_name == github.repository
          && github.event.sender.type != 'Bot'
          && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install cursor-sdk
        run: python -m pip install "cursor-sdk>=0.1.7,<0.2"
      - name: Start Cursor Review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CURSOR_AGENT_MODEL: composer-2.5
        run: python .github/scripts/cursor_review.py
